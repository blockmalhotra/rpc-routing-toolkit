name: CI
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate compose and config
      run: docker compose config --quiet
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Docker validation build
      run: docker build -t rpc-routing-toolkit . || echo 'demo stack - Dockerfile optional'
